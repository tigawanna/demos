apply plugin: 'com.android.library'
apply plugin: 'org.jetbrains.kotlin.android'

def nativeRoot = file("$projectDir/../..")

android {
    namespace 'com.margelo.nitro.demos'
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++20 -frtti -fexceptions"
                arguments "-DANDROID_STL=c++_shared"
                abiFilters(*rootProject.getProperties().getOrDefault("reactNativeArchitectures", "arm64-v8a").split(","))
            }
        }

        ndk {
            abiFilters(*rootProject.getProperties().getOrDefault("reactNativeArchitectures", "arm64-v8a").split(","))
        }
    }

    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
        }
    }

    sourceSets {
        main {
            java.srcDirs += ["${nativeRoot}/nitrogen/generated/android/kotlin"]
        }
    }

    buildFeatures {
        prefab true
    }
}

dependencies {
    implementation "com.facebook.react:react-android"
    implementation project(':react-native-nitro-modules')
}
